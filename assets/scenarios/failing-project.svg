<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Project Risk Discussion Illustration</title>
  <desc id="desc">Abstract office dashboard with warning trend and planning cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eef4ff"/>
      <stop offset="1" stop-color="#dce8ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#2f66f5"/>
      <stop offset="1" stop-color="#4a8cff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect x="90" y="110" width="1020" height="580" rx="30" fill="#fff" stroke="#c7d8ff" stroke-width="6"/>
  <rect x="140" y="170" width="520" height="320" rx="20" fill="#f7faff" stroke="#d6e3ff" stroke-width="4"/>
  <polyline points="185,430 255,350 325,370 420,280 520,310 610,240" fill="none" stroke="#e23c5b" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="610" cy="240" r="14" fill="#e23c5b"/>
  <rect x="710" y="170" width="350" height="90" rx="14" fill="url(#accent)"/>
  <rect x="710" y="290" width="350" height="90" rx="14" fill="#ecf3ff" stroke="#cfe0ff" stroke-width="3"/>
  <rect x="710" y="410" width="350" height="90" rx="14" fill="#ecf3ff" stroke="#cfe0ff" stroke-width="3"/>
  <rect x="710" y="530" width="210" height="70" rx="12" fill="#1f57e8"/>
  <rect x="940" y="530" width="120" height="70" rx="12" fill="#dfeaff"/>
</svg>
